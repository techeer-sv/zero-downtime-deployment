services:
  k6:
    image: grafana/k6:2.0.0
    environment:
      TARGET_URL: ${TARGET_URL:-http://100.116.150.4}
      K6_VUS: ${K6_VUS:-10}
      K6_MAX_VUS: ${K6_MAX_VUS:-20}
      K6_DURATION: ${K6_DURATION:-5m}
      K6_RPS: ${K6_RPS:-20}
      EXPECTED_VERSION: ${EXPECTED_VERSION:-}
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_PORT: "5665"
    command: run /scripts/bluegreen.js
    ports:
      - "5665:5665"
    volumes:
      - ./scripts:/scripts:ro
    working_dir: /scripts
