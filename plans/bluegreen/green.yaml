services:
  app-green:
    image: zero-downtime-app:${IMAGE_TAG}
    networks:
      - bluegreen-network
    ports:
      - "8083-8085:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    pull_policy: never
    labels:
      logging: enabled
      traefik.enable: "true"
      traefik.http.services.app-green.loadbalancer.server.port: "8080"
      traefik.http.services.app-green.loadbalancer.healthcheck.path: "/health"
      traefik.http.services.app-green.loadbalancer.healthcheck.interval: "10s"
      traefik.http.services.app-green.loadbalancer.healthcheck.timeout: "3s"

networks:
  bluegreen-network:
    external: true