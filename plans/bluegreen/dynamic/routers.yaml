http:
  routers:
    app-bg:
      rule: PathPrefix(`/`)
      entryPoints:
        - web
      service: app-bg

  services:
    app-bg:
      weighted:
        services:
          - name: app-blue@docker
            weight: 100
          - name: app-green@docker
            weight: 0
        healthcheck:
          path: "/health"
          interval: "10s"
          timeout: "3s"